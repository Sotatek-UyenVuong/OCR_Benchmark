<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR Benchmark</title>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs" type="module" id="pdfjs-script"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #0f1117; --surface: #1a1d2e; --surface2: #141624;
  --border: #2d3250; --text:    #e2e8f0; --muted:    #64748b;
  --accent: #7c83ff; --green:   #22c55e; --orange:   #fb923c;
  --red:    #ef4444; --cyan:    #a5f3fc;
}
body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
       background:var(--bg);color:var(--text);font-size:14px; }

/* ── layout ── */
.app { display:grid; grid-template-columns:300px 1fr; grid-template-rows:50px 1fr;
       height:100vh; overflow:hidden; }
.topbar { grid-column:1/-1; background:var(--surface2); border-bottom:1px solid var(--border);
          display:flex; align-items:center; padding:0 16px; gap:10px; }
.topbar h1 { font-size:15px; font-weight:700; color:var(--accent); margin-right:8px; }
.badge { padding:2px 9px; border-radius:99px; font-size:11px; font-weight:600; }
.badge-blue  { background:#1e2a4a; color:var(--accent); }
.badge-green { background:#1e3a2f; color:var(--green); }
.badge-orange{ background:#3a2a1a; color:var(--orange); }

/* ── sidebar ── */
.sidebar { background:var(--surface2); border-right:1px solid var(--border);
           display:flex; flex-direction:column; overflow:hidden; }
.sidebar-top { padding:10px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }
.sidebar-top input { width:100%; background:var(--bg); border:1px solid var(--border);
                     color:var(--text); padding:6px 10px; border-radius:6px; font-size:13px;
                     outline:none; }
.sidebar-top input:focus { border-color:var(--accent); }
.file-list { flex:1; overflow-y:auto; }
.group-hdr { padding:8px 12px 4px; font-size:10px; font-weight:700; letter-spacing:.08em;
             text-transform:uppercase; color:var(--accent); background:var(--bg);
             position:sticky; top:0; z-index:1; }
.file-item { padding:9px 12px; cursor:pointer; border-bottom:1px solid #1e2132;
             display:flex; align-items:center; gap:8px; transition:background .1s; }
.file-item:hover { background:#1e2132; }
.file-item.active { background:#1e2a4a; border-left:3px solid var(--accent); padding-left:9px; }
.file-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.dot-done    { background:var(--green); }
.dot-ocr     { background:var(--accent); }
.dot-pending { background:var(--orange); }
.file-info { flex:1; min-width:0; }
.file-name { font-size:13px; font-weight:500; color:var(--text); white-space:nowrap;
             overflow:hidden; text-overflow:ellipsis; }
.file-meta { font-size:11px; color:var(--muted); display:flex; gap:6px; margin-top:1px; }

/* ── main panels ── */
.main { display:flex; flex-direction:column; overflow:hidden; }
.steps-bar { background:var(--surface2); border-bottom:1px solid var(--border);
             padding:0 16px; display:flex; align-items:center; gap:4px; flex-shrink:0; }
.step { display:flex; align-items:center; gap:6px; padding:12px 8px;
        font-size:12px; font-weight:600; color:var(--muted); border-bottom:2px solid transparent;
        transition:color .15s; white-space:nowrap; }
.step.active { color:var(--accent); border-bottom-color:var(--accent); }
.step.done   { color:var(--green);  border-bottom-color:var(--green); }
.step-num { width:18px; height:18px; border-radius:50%; background:var(--border);
            color:var(--text); font-size:10px; display:flex; align-items:center;
            justify-content:center; flex-shrink:0; }
.step.active .step-num { background:var(--accent); }
.step.done   .step-num { background:var(--green); }
.sep { color:var(--border); font-size:16px; margin:0 2px; }

.panels { flex:1; overflow:hidden; display:flex; flex-direction:column; }
.panel { display:none; flex:1; flex-direction:column; overflow:hidden; }
.panel.active { display:flex; }

/* ── buttons ── */
.btn { padding:7px 16px; border-radius:6px; border:none; cursor:pointer; font-size:13px;
       font-weight:600; transition:all .12s; display:inline-flex; align-items:center; gap:6px; }
.btn:disabled { opacity:.35; cursor:default; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:not(:disabled):hover { background:#6366f1; }
.btn-success { background:var(--green); color:#fff; }
.btn-success:not(:disabled):hover { background:#16a34a; }
.btn-ghost { background:var(--border); color:var(--text); }
.btn-ghost:not(:disabled):hover { background:#3d4466; }
.btn-danger { background:#7f1d1d; color:#fca5a5; }
.btn-danger:not(:disabled):hover { background:#991b1b; }

/* ── step 1: pick file ── */
.file-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
             gap:12px; padding:20px; overflow-y:auto; align-content:start; }
.file-card { background:var(--surface); border:1px solid var(--border); border-radius:10px;
             padding:14px; cursor:pointer; transition:all .15s; }
.file-card:hover { border-color:var(--accent); background:#1e2a4a; }
.file-card.selected { border-color:var(--accent); background:#1e2a4a;
                      box-shadow:0 0 0 2px rgba(124,131,255,.3); }
.file-card .fc-name { font-weight:600; font-size:13px; margin-bottom:6px; }
.file-card .fc-meta { font-size:11px; color:var(--muted); line-height:1.6; }
.file-card .fc-badges { display:flex; gap:5px; flex-wrap:wrap; margin-top:8px; }
.chip { padding:2px 7px; border-radius:4px; font-size:10px; font-weight:600; }
.chip-green  { background:#1e3a2f; color:var(--green); }
.chip-blue   { background:#1e2a4a; color:var(--accent); }
.chip-orange { background:#3a2a1a; color:var(--orange); }

/* ── step 2: pick model + run OCR ── */
.step2-body { padding:24px; overflow-y:auto; display:flex; flex-direction:column; gap:20px;
              max-width:560px; margin:0 auto; width:100%; }
.card-block { background:var(--surface); border:1px solid var(--border); border-radius:10px;
              overflow:hidden; }
.card-block-title { padding:10px 16px; background:var(--surface2); border-bottom:1px solid var(--border);
                    font-size:12px; font-weight:700; text-transform:uppercase;
                    letter-spacing:.06em; color:var(--muted); }
.card-block-body { padding:14px 16px; }
.model-list { display:flex; flex-direction:column; gap:6px; }
.model-opt { display:flex; align-items:center; gap:10px; padding:9px 12px;
             border:1px solid var(--border); border-radius:7px; cursor:pointer; transition:.1s; }
.model-opt:hover { background:var(--surface2); }
.model-opt.selected { border-color:var(--accent); background:#1e2a4a; }
.model-opt input { accent-color:var(--accent); }
.model-opt .mn { font-weight:600; font-size:13px; }
.model-opt .mt { font-size:11px; color:var(--muted); }
.ocr-status { padding:12px 14px; border-radius:8px; font-size:13px;
              background:var(--surface2); border:1px solid var(--border); }
.ocr-status.running { border-color:var(--accent); color:var(--accent); }
.ocr-status.done    { border-color:var(--green); color:var(--green); }
.ocr-status.error   { border-color:var(--red); color:var(--red); }
.progress-wrap { height:4px; background:var(--border); border-radius:2px; margin-top:8px; }
.progress-fill { height:100%; border-radius:2px; background:var(--accent); transition:width .4s; }

/* ── step 3: review GT ── */
.review-body { display:grid; grid-template-columns:1fr 1fr; flex:1; overflow:hidden; }
.pdf-panel { display:flex; flex-direction:column; border-right:1px solid var(--border); overflow:hidden; }
.editor-panel { display:flex; flex-direction:column; overflow:hidden; }
.panel-hdr { padding:8px 14px; background:var(--surface2); border-bottom:1px solid var(--border);
             font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
             color:var(--muted); display:flex; align-items:center; justify-content:space-between; }
.pdf-frame { flex:1; }
/* ── pdf.js viewer ── */
.pdf-page-wrap { position:relative; margin:8px auto; display:block; }
.pdf-page-wrap canvas { display:block; box-shadow:0 2px 12px rgba(0,0,0,.5); }
.pdf-overlay { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
.pdf-overlay rect { fill:transparent; stroke-width:2; transition:fill .15s; rx:3; }
.pdf-overlay rect.hl-text  { stroke:#7c83ff; }
.pdf-overlay rect.hl-table { stroke:#22c55e; }
.pdf-overlay rect.active{ fill:rgba(124,131,255,.2); }
.pdf-overlay rect.active.hl-table{ fill:rgba(34,197,94,.2); }
.pdf-frame iframe { width:100%; height:100%; border:none; }
.page-tabs { display:flex; gap:3px; padding:7px 12px; background:var(--surface2);
             border-bottom:1px solid var(--border); flex-wrap:wrap; }
.tab { padding:3px 10px; border-radius:4px; cursor:pointer; font-size:12px; font-weight:600;
       background:var(--border); color:var(--muted); border:1px solid transparent; }
.tab.active { background:var(--accent); color:#fff; }
.editor-body { flex:1; overflow-y:auto; padding:12px; }
.text-area { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text);
             font-family:"JetBrains Mono","Fira Code",monospace; font-size:12px; line-height:1.65;
             padding:10px 12px; resize:vertical; outline:none; min-height:200px; border-radius:6px; }
.text-area:focus { border-color:var(--accent); }
.html-area { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--cyan);
             font-family:"JetBrains Mono","Fira Code",monospace; font-size:11px; line-height:1.5;
             padding:10px 12px; resize:vertical; outline:none; min-height:80px; border-radius:6px; }
.html-area:focus { border-color:var(--accent); }
.field-lbl { font-size:11px; color:var(--muted); margin:10px 0 4px; font-weight:600; }

/* ── step 4: scores ── */
.scores-body { padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:16px; }
.score-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.score-card-title { padding:10px 16px; background:var(--surface2); border-bottom:1px solid var(--border);
                    font-size:13px; font-weight:700; display:flex; align-items:center; gap:8px; }
.score-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:0; }
.score-cell { padding:14px 16px; border-right:1px solid var(--border); border-bottom:1px solid var(--border); }
.score-cell:last-child { border-right:none; }
.score-label { font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase;
               letter-spacing:.05em; margin-bottom:4px; }
.score-val { font-size:24px; font-weight:700; }
.score-good { color:var(--green); }
.score-mid  { color:var(--orange); }
.score-bad  { color:var(--red); }
.page-table { width:100%; border-collapse:collapse; font-size:12px; }
.page-table th { padding:7px 10px; background:var(--surface2); color:var(--muted);
                 font-weight:700; text-align:left; border-bottom:1px solid var(--border); }
.page-table td { padding:7px 10px; border-bottom:1px solid #1e2132; }
.page-table tr:hover td { background:#1e2132; }

/* ── action bar ── */
.action-bar { padding:10px 16px; background:var(--surface2); border-top:1px solid var(--border);
              display:flex; align-items:center; gap:10px; flex-shrink:0; }
.action-bar .info { flex:1; font-size:12px; color:var(--muted); }
.status-ok   { color:var(--green); }
.status-info { color:var(--accent); }
.status-err  { color:var(--red); }

/* ── toast ── */
#toast { position:fixed; bottom:20px; right:20px; padding:10px 18px; border-radius:8px;
         font-size:13px; font-weight:600; display:none; z-index:9999;
         box-shadow:0 4px 20px rgba(0,0,0,.5); background:var(--green); color:#fff; }
#toast.err { background:var(--red); }

/* ── empty ── */
.empty { display:flex; flex-direction:column; align-items:center; justify-content:center;
         height:100%; gap:10px; color:var(--muted); }
.empty svg { opacity:.25; }
</style>
</head>
<body>

<div class="app">
  <!-- topbar -->
  <div class="topbar">
    <h1>📋 OCR Benchmark</h1>
    <span class="badge badge-blue" id="stat-total">— files</span>
    <span class="badge badge-green" id="stat-eval">— evaluated</span>
    <span class="badge badge-orange" id="stat-pending">— pending</span>
    <div style="flex:1"></div>
    <button class="btn btn-ghost" onclick="refreshAll()" style="padding:5px 12px;font-size:12px">↻ Refresh</button>
  </div>

  <!-- sidebar -->
  <div class="sidebar">
    <div class="sidebar-top">
      <input type="search" placeholder="Filter files…" oninput="filterFiles(this.value)" id="search-box">
    </div>
    <div class="file-list" id="file-list"></div>
  </div>

  <!-- main -->
  <div class="main">
    <!-- steps indicator -->
    <div class="steps-bar">
      <div class="step" id="step-tab-1" onclick="goStep(1)">
        <div class="step-num">1</div> Select File
      </div>
      <span class="sep">›</span>
      <div class="step" id="step-tab-2" onclick="goStep(2)">
        <div class="step-num">2</div> Run OCR
      </div>
      <span class="sep">›</span>
      <div class="step" id="step-tab-3" onclick="goStep(3)">
        <div class="step-num">3</div> Review GT
      </div>
      <span class="sep">›</span>
      <div class="step" id="step-tab-4" onclick="goStep(4)">
        <div class="step-num">4</div> Scores
      </div>
    </div>

    <div class="panels">
      <!-- Step 1: file picker -->
      <div class="panel active" id="panel-1">
        <div style="padding:16px 20px 8px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-shrink:0">
          <span style="font-size:13px;color:var(--muted)">Choose a PDF to evaluate</span>
        </div>
        <div class="file-grid" id="file-grid"></div>
      </div>

      <!-- Step 2: model + run OCR -->
      <div class="panel" id="panel-2">
        <div class="step2-body" id="step2-body"></div>
      </div>

      <!-- Step 3: review GT -->
      <div class="panel" id="panel-3">
        <div class="review-body">
          <div class="pdf-panel">
            <div class="panel-hdr">
              PDF Preview
              <span id="pdf-page-info" style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px"></span>
            </div>
            <!-- PDF.js viewer: canvas + SVG overlay stacked -->
            <div id="pdf-frame" style="flex:1;overflow-y:auto;overflow-x:hidden;background:#525659;position:relative;">
              <div class="empty"><p>No PDF loaded</p></div>
            </div>
          </div>
          <div class="editor-panel">
            <div class="panel-hdr">
              Ground Truth Editor
              <span id="editor-mode-lbl" style="font-weight:400;text-transform:none;letter-spacing:0"></span>
            </div>
            <div class="page-tabs" id="page-tabs"></div>
            <div class="editor-body" id="editor-body">
              <div class="empty"><p>Load a file first</p></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Step 4: scores -->
      <div class="panel" id="panel-4">
        <div class="scores-body" id="scores-body">
          <div class="empty" style="height:300px"><p>No scores yet — save GT to evaluate</p></div>
        </div>
      </div>
    </div>

    <!-- action bar -->
    <div class="action-bar">
      <div class="info" id="action-info">Select a file to start</div>
      <button class="btn btn-ghost" id="btn-back" onclick="prevStep()" disabled style="padding:6px 12px">← Back</button>
      <button class="btn btn-ghost" id="btn-copy-draft" onclick="copyDraft()" disabled>Reset Draft</button>
      <button class="btn btn-success" id="btn-save-eval" onclick="saveAndEval()" disabled>💾 Save GT &amp; Evaluate</button>
      <button class="btn btn-primary" id="btn-next" onclick="nextStep()" disabled>Next →</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════════
const S = {
  step: 1,
  pdfs: [],
  selected: null,
  model: 'marker',
  jobId: null,
  pollTimer: null,
  editorData: {},   // pageNum → { page_num, full_text, tables? }
  editorSplit: 'text',
  textData: {},
  tableData: {},
  scores: null,
};

const MODELS = [
  { id:'marker', name:'Marker OCR', tier:'Open source — datalab.to' },
];

// ═══════════════════════════════════════════════════════════════
// Utils
// ═══════════════════════════════════════════════════════════════
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function clone(o){ return JSON.parse(JSON.stringify(o)); }
function toast(msg, err=false){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=err?'err':'';
  el.style.display='block';
  clearTimeout(el._t); el._t=setTimeout(()=>el.style.display='none',3500);
}
function info(msg, cls=''){
  const el=document.getElementById('action-info');
  el.textContent=msg; el.className=cls;
}
function scoreClass(v, lowerBetter=true){
  if(v===null||v===undefined) return '';
  if(lowerBetter) return v<0.05?'score-good':v<0.15?'score-mid':'score-bad';
  return v>0.9?'score-good':v>0.7?'score-mid':'score-bad';
}

// ═══════════════════════════════════════════════════════════════
// Step navigation
// ═══════════════════════════════════════════════════════════════
function goStep(n){
  if(n<1||n>4) return;
  S.step=n;
  document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active',i+1===n));
  [1,2,3,4].forEach(i=>{
    const t=document.getElementById(`step-tab-${i}`);
    t.classList.remove('active','done');
    if(i===n) t.classList.add('active');
    else if(i<n) t.classList.add('done');
  });
  document.getElementById('btn-back').disabled = n<=1;
  document.getElementById('btn-next').disabled = n>=4 || !canAdvance(n);
  document.getElementById('btn-save-eval').disabled = n!==3 || !S.selected?.ocr_done?.marker;
  document.getElementById('btn-copy-draft').disabled = n!==3;
  if(n===3) renderReview();
  if(n===4 && S.scores) renderScores(S.scores);
  updateStepInfo();
}
function nextStep(){ goStep(S.step+1); }
function prevStep(){ goStep(S.step-1); }
function canAdvance(step){
  if(step===1) return !!S.selected;
  if(step===2) return S.selected?.ocr_done?.marker;
  if(step===3) return true;
  return false;
}
function updateStepInfo(){
  const msgs = {
    1: S.selected ? `Selected: ${S.selected.doc_id}` : 'Select a PDF to continue',
    2: 'Choose model and run OCR',
    3: 'Review and edit Ground Truth, then save & evaluate',
    4: S.scores ? 'Evaluation complete' : 'No scores yet',
  };
  info(msgs[S.step] || '');
}

// ═══════════════════════════════════════════════════════════════
// Data loading
// ═══════════════════════════════════════════════════════════════
async function refreshAll(){
  const res = await fetch('/api/ocr/pdfs');
  S.pdfs = await res.json();

  const total   = S.pdfs.length;
  const evalDone = S.pdfs.filter(p=>p.eval_done?.marker).length;
  const pending  = total - evalDone;
  document.getElementById('stat-total').textContent   = `${total} files`;
  document.getElementById('stat-eval').textContent    = `${evalDone} evaluated`;
  document.getElementById('stat-pending').textContent = `${pending} pending`;

  renderSidebar(S.pdfs);
  renderFileGrid(S.pdfs);
  updateStepInfo();
}

function filterFiles(q){
  const lower = q.toLowerCase();
  const filtered = S.pdfs.filter(p=>
    p.doc_id.toLowerCase().includes(lower) ||
    p.uc_type.includes(lower) ||
    p.lang.includes(lower)
  );
  renderSidebar(filtered);
  renderFileGrid(filtered);
}

function selectFile(pdf){
  S.selected = pdf;
  // Update sidebar highlight
  document.querySelectorAll('.file-item').forEach(el=>el.classList.remove('active'));
  document.querySelector(`[data-id="${pdf.doc_id}"]`)?.classList.add('active');
  // Update grid
  document.querySelectorAll('.file-card').forEach(el=>el.classList.remove('selected'));
  document.querySelector(`.file-card[data-id="${pdf.doc_id}"]`)?.classList.add('selected');

  document.getElementById('btn-next').disabled = false;
  info(`Selected: ${pdf.doc_id}  [${pdf.uc_type}/${pdf.lang}]`);
  // Go to step 2 immediately
  buildStep2();
  goStep(2);
}
</script>

<script>
// ═══════════════════════════════════════════════════════════════
// Sidebar + file grid render
// ═══════════════════════════════════════════════════════════════
function dotClass(pdf){
  if(pdf.eval_done?.marker) return 'dot-done';
  if(pdf.ocr_done?.marker)  return 'dot-ocr';
  return 'dot-pending';
}
function statusChips(pdf){
  const chips=[];
  if(pdf.eval_done?.marker) chips.push('<span class="chip chip-green">✓ evaluated</span>');
  else if(pdf.gt_saved)     chips.push('<span class="chip chip-blue">GT saved</span>');
  if(pdf.ocr_done?.marker)  chips.push('<span class="chip chip-blue">OCR done</span>');
  else                      chips.push('<span class="chip chip-orange">needs OCR</span>');
  return chips.join('');
}

function renderSidebar(pdfs){
  const list=document.getElementById('file-list');
  list.innerHTML='';
  const groups={};
  for(const p of pdfs){ const k=`${p.uc_type}/${p.lang}`; (groups[k]=groups[k]||[]).push(p); }
  for(const [grp,files] of Object.entries(groups)){
    const hdr=document.createElement('div');
    hdr.className='group-hdr'; hdr.textContent=grp;
    list.appendChild(hdr);
    for(const f of files){
      const el=document.createElement('div');
      el.className='file-item'; el.dataset.id=f.doc_id;
      if(S.selected?.doc_id===f.doc_id) el.classList.add('active');
      el.innerHTML=`
        <div class="file-dot ${dotClass(f)}"></div>
        <div class="file-info">
          <div class="file-name">${f.doc_id}</div>
          <div class="file-meta"><span>${f.uc_type}</span><span>${f.lang}</span></div>
        </div>`;
      el.onclick=()=>selectFile(f);
      list.appendChild(el);
    }
  }
}

function renderFileGrid(pdfs){
  const grid=document.getElementById('file-grid');
  grid.innerHTML='';
  if(!pdfs.length){
    grid.innerHTML='<div class="empty" style="grid-column:1/-1;height:200px"><p>No files found</p></div>';
    return;
  }
  for(const f of pdfs){
    const el=document.createElement('div');
    el.className='file-card'; el.dataset.id=f.doc_id;
    if(S.selected?.doc_id===f.doc_id) el.classList.add('selected');
    el.innerHTML=`
      <div class="fc-name">${f.doc_id}</div>
      <div class="fc-meta">
        ${f.uc_type} · ${f.lang_label}<br>
        PDF ${f.pdf_url?'✓':'✗'}
      </div>
      <div class="fc-badges">${statusChips(f)}</div>`;
    el.onclick=()=>selectFile(f);
    grid.appendChild(el);
  }
}

// ═══════════════════════════════════════════════════════════════
// Step 2: model selection + OCR
// ═══════════════════════════════════════════════════════════════
function buildStep2(){
  const f=S.selected;
  const body=document.getElementById('step2-body');
  const ocrDone=f.ocr_done?.marker;
  body.innerHTML=`
    <div style="font-size:15px;font-weight:700;color:var(--text)">
      ${f.doc_id} <span style="font-size:12px;font-weight:400;color:var(--muted)">[${f.uc_type}/${f.lang}]</span>
    </div>

    <div class="card-block">
      <div class="card-block-title">OCR Model</div>
      <div class="card-block-body">
        <div class="model-list">
          ${MODELS.map(m=>`
            <label class="model-opt ${S.model===m.id?'selected':''}" onclick="selectModel('${m.id}')">
              <input type="radio" name="model" value="${m.id}" ${S.model===m.id?'checked':''}>
              <div>
                <div class="mn">${m.name}</div>
                <div class="mt">${m.tier}</div>
              </div>
            </label>`).join('')}
        </div>
      </div>
    </div>

    <div class="card-block">
      <div class="card-block-title">OCR Status</div>
      <div class="card-block-body" style="display:flex;flex-direction:column;gap:10px">
        <div id="ocr-status-box" class="ocr-status ${ocrDone?'done':''}">
          ${ocrDone
            ? '✅ OCR already done — prediction files ready'
            : '⏳ Not yet run for this file'}
          <div class="progress-wrap" id="progress-wrap" style="${ocrDone?'display:none':''}">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary" id="btn-run-ocr" onclick="runOCR(false)"
            ${ocrDone?'':''}>${ocrDone?'Re-run OCR':'▶ Run OCR'}</button>
          ${ocrDone?`<button class="btn btn-ghost" onclick="runOCR(true)">Force re-run</button>`:''}
        </div>
      </div>
    </div>

    ${ocrDone?`
    <div style="display:flex;justify-content:flex-end">
      <button class="btn btn-primary" onclick="goStep(3)">Next: Review GT →</button>
    </div>`:''}
  `;
}

function selectModel(id){
  S.model=id;
  document.querySelectorAll('.model-opt').forEach(el=>{
    el.classList.toggle('selected', el.querySelector('input').value===id);
  });
}

async function runOCR(force=false){
  const f=S.selected;
  const btn=document.getElementById('btn-run-ocr');
  btn.disabled=true; btn.textContent='Running…';

  const statusBox=document.getElementById('ocr-status-box');
  statusBox.className='ocr-status running';
  statusBox.innerHTML='⏳ Submitting to Marker API…<div class="progress-wrap"><div class="progress-fill" id="progress-fill" style="width:5%"></div></div>';

  try {
    const res=await fetch('/api/ocr/run',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({doc_id:f.doc_id,uc_type:f.uc_type,lang:f.lang,model:S.model,force,ocr_mode:'balanced'})
    });
    const data=await res.json();

    if(data.status==='skipped'){
      statusBox.className='ocr-status done';
      statusBox.innerHTML='✅ OCR already done — skipped (use Force re-run to redo)';
      btn.disabled=false; btn.textContent='Re-run OCR';
      toast('OCR already done');
      S.selected.ocr_done={marker:true};
      buildStep2();
      return;
    }

    S.jobId=data.job_id;
    pollJob();
  } catch(e){
    statusBox.className='ocr-status error';
    statusBox.innerHTML=`❌ ${e.message}`;
    btn.disabled=false; btn.textContent='Retry';
  }
}

function pollJob(){
  if(S.pollTimer) clearInterval(S.pollTimer);
  S.pollTimer=setInterval(async()=>{
    if(!S.jobId) return;
    const res=await fetch(`/api/ocr/job/${S.jobId}`);
    const job=await res.json();

    const statusBox=document.getElementById('ocr-status-box');
    const fill=document.getElementById('progress-fill');
    if(fill) fill.style.width=`${job.progress}%`;
    if(statusBox) statusBox.innerHTML=`⏳ ${job.message}<div class="progress-wrap"><div class="progress-fill" style="width:${job.progress}%"></div></div>`;

    if(job.status==='done'){
      clearInterval(S.pollTimer);
      statusBox.className='ocr-status done';
      statusBox.innerHTML='✅ OCR complete! Prediction files saved.';
      S.selected.ocr_done={marker:true};
      toast('✅ OCR complete');
      await refreshAll();
      buildStep2();
    } else if(job.status==='error'){
      clearInterval(S.pollTimer);
      statusBox.className='ocr-status error';
      statusBox.innerHTML=`❌ Error: ${job.message}`;
      toast(job.message, true);
    }
  }, 2000);
}
</script>

<script>
// ═══════════════════════════════════════════════════════════════
// Step 3: GT Review  —  text + table cùng 1 editor, toggle bằng mode bar
// ═══════════════════════════════════════════════════════════════
// S.editorSplit = 'text' | 'table'  (mode đang hiển thị)
// S.textData    = { pageNum: { page_num, full_text } }
// S.tableData   = { pageNum: { page_num, tables } }

async function renderReview(){
  const f=S.selected;
  if(!f) return;

  // Load PDF
  const pdfFrame=document.getElementById('pdf-frame');
  pdfFrame.innerHTML=f.pdf_url
    ?`<iframe src="${f.pdf_url}" title="PDF"></iframe>`
    :'<div class="empty"><p>PDF not available</p></div>';

  // Load cả text lẫn table draft (song song)
  const loads = [];
  if(f.has_text_pred || !f.has_table_pred){
    loads.push(loadDraft(f,'text'));
  }
  if(f.has_table_pred){
    loads.push(loadDraft(f,'table'));
  }
  if(!loads.length) loads.push(loadDraft(f,'unified'));

  const results = await Promise.all(loads);

  // Lưu vào S — nếu GT đã save thì dùng, không thì dùng draft
  S.textData  = {};
  S.tableData = {};

  for(const d of results){
    if(!d) continue;
    const source = d.existing_gt || d.draft;
    if(d.split === 'text' || d.split === 'unified'){
      for(const p of (source.pages||[])){
        S.textData[p.page_num] = clone(p);
        // Đảm bảo có full_text
        if(S.textData[p.page_num].full_text === undefined)
          S.textData[p.page_num].full_text = '';
      }
    }
    if(d.split === 'table'){
      for(const p of (source.pages||[])){
        S.tableData[p.page_num] = clone(p);
      }
    }
    // unified: copy tables vào tableData cũng
    if(d.split === 'unified'){
      for(const p of (source.pages||[])){
        if((p.tables||[]).length > 0){
          S.tableData[p.page_num] = clone(p);
        }
      }
    }
  }

  // Merge tableData vào textData (mỗi page có cả text lẫn tables)
  const allPageNums = new Set([
    ...Object.keys(S.textData).map(Number),
    ...Object.keys(S.tableData).map(Number),
  ]);
  for(const pn of allPageNums){
    if(!S.textData[pn]) S.textData[pn] = {page_num:pn, full_text:''};
    if(S.tableData[pn])
      S.textData[pn].tables = S.tableData[pn].tables;
  }
  S.editorData = S.textData;

  // Default mode: text
  S.editorSplit = 'text';
  buildEditorChrome();

  const hasGT = results.some(d=>d?.gt_saved);
  info(hasGT ? '✓ GT already saved — editing will update it'
             : 'Review Marker output, fix errors, then Save & Evaluate',
       hasGT ? 'status-ok' : '');
}

async function loadDraft(f, split){
  const actualSplit = split==='unified' ? 'unified' : split;
  const p=new URLSearchParams({doc_id:f.doc_id,uc_type:f.uc_type,lang:f.lang,split:actualSplit});
  try{
    const res=await fetch(`/api/gt/load?${p}`);
    if(!res.ok) return null;
    const d=await res.json();
    d.split = split;
    return d;
  }catch{ return null; }
}

// ── Editor chrome: mode toggle + page tabs ─────────────────────
function buildEditorChrome(){
  const f=S.selected;
  const hasText  = Object.values(S.editorData).some(p=>(p.full_text||'').trim().length>0);
  const hasTable = Object.values(S.editorData).some(p=>(p.tables||[]).length>0);

  // Mode lbl → replace with toggle buttons
  const modeLbl = document.getElementById('editor-mode-lbl');
  modeLbl.innerHTML = `
    <span style="display:inline-flex;gap:4px;margin-left:8px">
      ${hasText ?`<button id="mode-text"  onclick="setEditorMode('text')"
        class="btn btn-ghost" style="padding:3px 10px;font-size:11px;
        ${S.editorSplit==='text'?'background:var(--accent);color:#fff':''}">
        📝 Text</button>`:''}
      ${hasTable?`<button id="mode-table" onclick="setEditorMode('table')"
        class="btn btn-ghost" style="padding:3px 10px;font-size:11px;
        ${S.editorSplit==='table'?'background:var(--accent);color:#fff':''}">
        📊 Table</button>`:''}
    </span>`;

  // Page tabs
  const allPages = Object.values(S.editorData).sort((a,b)=>a.page_num-b.page_num);
  renderTabs(allPages);
  if(allPages.length) renderPage(allPages[0].page_num);
}

function setEditorMode(mode){
  S.editorSplit = mode;
  // Update button styles
  const tb = document.getElementById('mode-text');
  const tb2= document.getElementById('mode-table');
  if(tb)  tb.style.cssText  = tb.style.cssText.replace(/background:[^;]+;color:[^;]+/,'') + (mode==='text' ?';background:var(--accent);color:#fff':'');
  if(tb2) tb2.style.cssText = tb2.style.cssText.replace(/background:[^;]+;color:[^;]+/,'') + (mode==='table'?';background:var(--accent);color:#fff':'');
  // Re-render current page
  const activeTab=document.querySelector('.tab.active');
  const pn=activeTab?+activeTab.id.replace('tab-',''):1;
  renderPage(pn);
}

function renderTabs(pages){
  const el=document.getElementById('page-tabs');
  el.innerHTML='';
  if(!pages.length){ el.innerHTML='<span style="color:var(--muted);font-size:12px">No pages</span>'; return; }
  for(const p of pages){
    const tab=document.createElement('div');
    tab.className='tab'; tab.id=`tab-${p.page_num}`;
    // Badge nếu có table
    const hasTbl=(p.tables||[]).length>0;
    tab.innerHTML=`P${p.page_num}${hasTbl?' <sup style="color:var(--accent);font-size:9px">T</sup>':''}`;
    tab.onclick=()=>{
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      renderPage(p.page_num);
    };
    el.appendChild(tab);
  }
  document.getElementById(`tab-${pages[0].page_num}`)?.classList.add('active');
}

function renderPage(pageNum){
  const body=document.getElementById('editor-body');
  const page=S.editorData[pageNum];
  if(!page){ body.innerHTML='<div class="empty"><p>Page not found</p></div>'; return; }
  body.innerHTML='';

  if(S.editorSplit === 'text'){
    // ── text editor ──
    const wrap=document.createElement('div');
    wrap.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span class="field-lbl" style="margin:0">Page ${pageNum} · full_text</span>
        <span style="font-size:11px;color:var(--muted)" id="cc-${pageNum}">${(page.full_text||'').length} chars</span>
      </div>
      <textarea class="text-area" id="ta-${pageNum}" oninput="onTextInput(${pageNum})"
        style="min-height:calc(100vh - 340px)">${esc(page.full_text||'')}</textarea>`;
    body.appendChild(wrap);

  } else {
    // ── table editor ──
    const tables=page.tables||[];
    if(!tables.length){
      body.innerHTML=`<div class="empty" style="height:200px">
        <p>No tables on page ${pageNum}</p>
        <span style="font-size:12px;color:var(--muted)">Switch to Text mode to edit text content</span>
      </div>`;
      return;
    }
    for(let ti=0;ti<tables.length;ti++){
      const t=tables[ti];
      const sec=document.createElement('div');
      sec.style.marginBottom='16px';
      sec.innerHTML=`
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span class="field-lbl" style="margin:0">Table ${t.table_id}</span>
          <span style="font-size:11px;color:var(--muted)">${(t.cells||[]).length} cells</span>
          <button class="btn btn-ghost" style="padding:3px 9px;font-size:11px;margin-left:auto"
            onclick="togglePreview(${pageNum},${ti})">👁 Preview</button>
        </div>
        <textarea class="html-area" id="th-${pageNum}-${ti}" oninput="onHtmlInput(${pageNum},${ti})"
          rows="10">${esc(t.html||'')}</textarea>
        <div id="tp-${pageNum}-${ti}" style="display:none;margin-top:8px;padding:10px;
          background:var(--bg);border:1px solid var(--border);border-radius:6px;overflow-x:auto;
          font-size:12px;color:var(--text)"></div>`;
      body.appendChild(sec);
    }
  }
}

function onTextInput(pageNum){
  const v=document.getElementById(`ta-${pageNum}`).value;
  S.editorData[pageNum].full_text=v;
  const cc=document.getElementById(`cc-${pageNum}`);
  if(cc) cc.textContent=`${v.length} chars`;
}
function onHtmlInput(pageNum,ti){
  const v=document.getElementById(`th-${pageNum}-${ti}`).value;
  S.editorData[pageNum].tables[ti].html=v;
  S.editorData[pageNum].tables[ti].cells=parseCells(v);
}
function togglePreview(pageNum,ti){
  const el=document.getElementById(`tp-${pageNum}-${ti}`);
  const html=document.getElementById(`th-${pageNum}-${ti}`).value;
  if(el.style.display==='none'){
    el.innerHTML=html; el.style.display='block';
  } else { el.style.display='none'; }
}

function parseCells(html){
  const doc=new DOMParser().parseFromString(html,'text/html');
  const cells=[];
  doc.querySelectorAll('tr').forEach((row,ri)=>{
    let ci=0;
    row.querySelectorAll('td,th').forEach(cell=>{
      cells.push({row:ri,col:ci,
        rowspan:+cell.getAttribute('rowspan')||1,
        colspan:+cell.getAttribute('colspan')||1,
        text:cell.textContent.trim(),
        is_header:cell.tagName.toLowerCase()==='th'});
      ci+=+cell.getAttribute('colspan')||1;
    });
  });
  return cells;
}

async function copyDraft(){
  if(!S.selected||!confirm('Reset editor to original Marker output?')) return;
  await renderReview();
  toast('Draft restored');
}
</script>

<script>
// ═══════════════════════════════════════════════════════════════
// Save GT + Evaluate (chained)
// ═══════════════════════════════════════════════════════════════
async function saveAndEval(){
  const f=S.selected;
  if(!f) return;

  const btn=document.getElementById('btn-save-eval');
  btn.disabled=true; btn.textContent='⏳ Saving…';
  info('Saving GT…','status-info');

  // Build unified GT: mỗi page có full_text + tables (nếu có)
  const pages=Object.values(S.editorData)
    .sort((a,b)=>a.page_num-b.page_num)
    .map(p=>{
      const out={page_num:p.page_num, full_text:p.full_text||''};
      if((p.tables||[]).length>0) out.tables=p.tables;
      return out;
    });
  const gtData={doc_id:f.doc_id, pages};

  try {
    // 1. Save GT
    const saveRes=await fetch('/api/gt/save',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({doc_id:f.doc_id,uc_type:f.uc_type,lang:f.lang,gt_data:gtData})
    });
    if(!saveRes.ok) throw new Error((await saveRes.json()).detail||'Save failed');
    toast('GT saved ✓');

    // 2. Evaluate
    btn.textContent='⏳ Evaluating…';
    info('Running evaluation…','status-info');

    const hasBoth = f.has_text_pred && f.has_table_pred;
    const split = hasBoth ? 'both' : (f.has_table_pred ? 'table' : 'text');

    const evalRes=await fetch('/api/ocr/eval',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({doc_id:f.doc_id,uc_type:f.uc_type,lang:f.lang,model:S.model,split})
    });
    if(!evalRes.ok) throw new Error((await evalRes.json()).detail||'Eval failed');
    S.scores=await evalRes.json();

    toast('✅ Evaluation complete!');
    info('Done! Showing scores…','status-ok');
    btn.textContent='💾 Save GT & Evaluate';
    btn.disabled=false;

    await refreshAll();
    renderScores(S.scores);
    goStep(4);
  } catch(e){
    toast(e.message, true);
    info(e.message,'status-err');
    btn.textContent='💾 Save GT & Evaluate';
    btn.disabled=false;
  }
}

// ═══════════════════════════════════════════════════════════════
// Step 4: render scores
// ═══════════════════════════════════════════════════════════════
function renderScores(data){
  const body=document.getElementById('scores-body');
  body.innerHTML='';

  const f=S.selected;
  const hdr=document.createElement('div');
  hdr.style.cssText='font-size:15px;font-weight:700;margin-bottom:4px';
  hdr.innerHTML=`${data.doc_id} <span style="font-size:12px;font-weight:400;color:var(--muted)">[${f?.uc_type}/${f?.lang}] · ${data.model}</span>`;
  body.appendChild(hdr);

  // Text scores
  if(data.text){
    const s=data.text.summary;
    body.appendChild(buildScoreCard('📝 Text Evaluation (CER / WER)', [
      {label:'CER',  val:s.avg_cer,  lower:true},
      {label:'WER',  val:s.avg_wer,  lower:true},
      {label:'nWER', val:s.avg_nwer, lower:true},
      ...(s.avg_mean_iou!==undefined?[{label:'IoU',val:s.avg_mean_iou,lower:false}]:[]),
      {label:'Pages', val:s.n_pages, raw:true},
    ]));

    // Per-page table
    body.appendChild(buildPageTable(data.text.pages, 'text'));
  }

  // Table scores
  if(data.table){
    const s=data.table.summary;
    body.appendChild(buildScoreCard('📊 Table Evaluation (TEDS)', [
      {label:'Avg TEDS', val:s.avg_teds, lower:false},
      {label:'Pages', val:s.n_pages, raw:true},
    ]));
    body.appendChild(buildPageTable(data.table.pages, 'table'));
  }

  if(!data.text && !data.table){
    body.innerHTML='<div class="empty" style="height:200px"><p>No scores available</p></div>';
  }
}

function buildScoreCard(title, metrics){
  const card=document.createElement('div');
  card.className='score-card';
  card.innerHTML=`<div class="score-card-title">${title}</div>
    <div class="score-grid">
      ${metrics.map(m=>`
        <div class="score-cell">
          <div class="score-label">${m.label}</div>
          <div class="score-val ${m.raw?'':scoreClass(m.val,m.lower)}">
            ${m.raw ? m.val : (m.val*100).toFixed(1)+'%'}
          </div>
        </div>`).join('')}
    </div>`;
  return card;
}

function buildPageTable(pages, type){
  const card=document.createElement('div');
  card.className='score-card';
  card.style.marginTop='8px';

  const cols = type==='table'
    ? ['Page','Avg TEDS']
    : ['Page','CER','WER','nWER'];

  card.innerHTML=`<div class="card-block-title" style="padding:8px 16px">Per-page detail</div>
    <table class="page-table">
      <thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
      <tbody>${pages.map(p=>`<tr>
        <td>P${p.page_num}</td>
        ${type==='table'
          ?`<td class="${scoreClass(p.avg_teds,false)}">${(p.avg_teds*100).toFixed(1)}%</td>`
          :`<td class="${scoreClass(p.cer,true)}">${(p.cer*100).toFixed(2)}%</td>
            <td class="${scoreClass(p.wer,true)}">${((p.wer||0)*100).toFixed(2)}%</td>
            <td class="${scoreClass(p.nwer,true)}">${((p.nwer||0)*100).toFixed(2)}%</td>`}
      </tr>`).join('')}</tbody>
    </table>`;
  return card;
}

// ═══════════════════════════════════════════════════════════════
// Ctrl+S shortcut
// ═══════════════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){
    e.preventDefault();
    if(S.step===3&&!document.getElementById('btn-save-eval').disabled) saveAndEval();
  }
});

// ═══════════════════════════════════════════════════════════════
// Boot
// ═══════════════════════════════════════════════════════════════
refreshAll();
</script>

<!-- ═══════════════════════════════════════════════════════════
     PDF.js viewer + bbox highlight (ES module)
     ═══════════════════════════════════════════════════════════ -->
<script type="module">
import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.worker.min.mjs';

// State shared with main scripts via window.PDF
window.PDF = {
  lib: pdfjsLib,
  doc: null,
  bboxes: {},     // { "1": [{block_id,type,bbox,text}] }
  activeBlock: null,  // { pageNum, blockId }
  canvases: {},   // pageNum → canvas element
  overlays: {},   // pageNum → svg element
  SCALE: 1.5,
};

// ── render all pages ──────────────────────────────────────────
window.PDF.renderDocument = async function(url) {
  const frame = document.getElementById('pdf-frame');
  frame.innerHTML = '<div style="padding:20px;color:var(--muted);text-align:center">Loading PDF…</div>';

  try {
    const doc = await pdfjsLib.getDocument(url).promise;
    window.PDF.doc = doc;
    window.PDF.canvases = {};
    window.PDF.overlays = {};
    frame.innerHTML = '';

    document.getElementById('pdf-page-info').textContent = `${doc.numPages} pages`;

    for(let pn = 1; pn <= doc.numPages; pn++) {
      const page = await doc.getPage(pn);
      const viewport = page.getViewport({ scale: window.PDF.SCALE });

      // wrapper
      const wrap = document.createElement('div');
      wrap.className = 'pdf-page-wrap';
      wrap.id = `pdf-page-${pn}`;
      wrap.style.width = viewport.width + 'px';

      // canvas
      const canvas = document.createElement('canvas');
      canvas.width  = viewport.width;
      canvas.height = viewport.height;
      window.PDF.canvases[pn] = canvas;

      // SVG overlay
      const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
      svg.setAttribute('class','pdf-overlay');
      svg.setAttribute('viewBox',`0 0 ${viewport.width} ${viewport.height}`);
      svg.setAttribute('width', viewport.width);
      svg.setAttribute('height', viewport.height);
      window.PDF.overlays[pn] = svg;

      wrap.appendChild(canvas);
      wrap.appendChild(svg);
      frame.appendChild(wrap);

      // render page
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    }

    // Draw bboxes once all pages rendered
    window.PDF.drawAllBboxes();
  } catch(e) {
    frame.innerHTML = `<div style="padding:20px;color:var(--red)">${e.message}</div>`;
  }
};

// ── draw all bboxes on all pages ──────────────────────────────
window.PDF.drawAllBboxes = function() {
  for(const [pnStr, blocks] of Object.entries(window.PDF.bboxes)) {
    const pn = +pnStr;
    window.PDF.drawPageBboxes(pn, blocks);
  }
};

window.PDF.drawPageBboxes = function(pn, blocks) {
  const svg = window.PDF.overlays[pn];
  const canvas = window.PDF.canvases[pn];
  if(!svg || !canvas) return;

  svg.innerHTML = '';
  const W = canvas.width, H = canvas.height;

  for(const blk of blocks) {
    const [x1,y1,x2,y2] = blk.bbox;
    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',      (x1 * W).toFixed(1));
    rect.setAttribute('y',      (y1 * H).toFixed(1));
    rect.setAttribute('width',  ((x2-x1) * W).toFixed(1));
    rect.setAttribute('height', ((y2-y1) * H).toFixed(1));
    rect.setAttribute('rx', '3');

    const isTable = blk.type === 'Table';
    rect.setAttribute('class', isTable ? 'hl-table' : 'hl-text');
    rect.dataset.blockId = blk.block_id;
    rect.dataset.page    = pn;
    rect.dataset.type    = blk.type;
    rect.dataset.text    = blk.text;
    rect.style.pointerEvents = 'all';
    rect.style.cursor = 'pointer';

    rect.addEventListener('mouseenter', () => {
      if(!rect.classList.contains('active')) rect.style.fillOpacity = '0.08';
    });
    rect.addEventListener('mouseleave', () => {
      if(!rect.classList.contains('active')) rect.style.fillOpacity = '0';
    });
    rect.addEventListener('click', (e) => {
      e.stopPropagation();
      window.PDF.activateBlock(pn, blk.block_id, isTable ? 'table' : 'text');
    });

    svg.appendChild(rect);
  }
};

// ── activate a block: highlight + jump editor ─────────────────
window.PDF.activateBlock = function(pn, blockId, type) {
  // Clear previous active
  document.querySelectorAll('.pdf-overlay rect.active').forEach(r => r.classList.remove('active'));

  // Highlight new
  const rect = document.querySelector(`[data-page="${pn}"][data-block-id="${blockId}"]`);
  if(rect) rect.classList.add('active');

  window.PDF.activeBlock = { pn, blockId, type };

  // Switch editor mode to match block type
  if(type === 'table') {
    window.setEditorMode('table');
  } else {
    window.setEditorMode('text');
  }

  // Jump to correct page tab
  const tab = document.getElementById(`tab-${pn}`);
  if(tab && !tab.classList.contains('active')) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    window.renderPage(pn);
  }

  // Scroll editor to top (page already shown)
  document.getElementById('editor-body')?.scrollTo({ top: 0, behavior: 'smooth' });
};

// ── highlight from editor side (click tab/textarea) ───────────
window.PDF.highlightPage = function(pn) {
  const pageEl = document.getElementById(`pdf-page-${pn}`);
  if(!pageEl) return;
  pageEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
};

window.PDF.highlightBlock = function(pn, blockId) {
  document.querySelectorAll('.pdf-overlay rect.active').forEach(r => r.classList.remove('active'));
  const rect = document.querySelector(`[data-page="${pn}"][data-block-id="${blockId}"]`);
  if(rect) {
    rect.classList.add('active');
    window.PDF.highlightPage(pn);
  }
};
</script>

<script>
// ── override renderReview to use PDF.js ───────────────────────
const _origRenderReview = window.renderReview;

// Patch renderReview to also load PDF.js + bboxes
const _patchedRenderReview = async function() {
  const f = S.selected;
  if(!f) return;

  // Load PDF.js document
  if(f.pdf_url) {
    await window.PDF.renderDocument(f.pdf_url);
  }

  // Load bboxes
  const bRes = await fetch(`/api/gt/bboxes?doc_id=${f.doc_id}&uc_type=${f.uc_type}&lang=${f.lang}`);
  if(bRes.ok) {
    window.PDF.bboxes = (await bRes.json()).pages || {};
    window.PDF.drawAllBboxes();
  }

  // Load text+table data (existing renderReview logic)
  const loads = [];
  if(f.has_text_pred || !f.has_table_pred) loads.push(loadDraft(f,'text'));
  if(f.has_table_pred) loads.push(loadDraft(f,'table'));
  if(!loads.length) loads.push(loadDraft(f,'unified'));

  const results = await Promise.all(loads);
  S.textData = {}; S.tableData = {};

  for(const d of results){
    if(!d) continue;
    const source = d.existing_gt || d.draft;
    if(d.split === 'text' || d.split === 'unified'){
      for(const p of (source.pages||[])){
        S.textData[p.page_num] = clone(p);
        if(S.textData[p.page_num].full_text === undefined)
          S.textData[p.page_num].full_text = '';
      }
    }
    if(d.split === 'table'){
      for(const p of (source.pages||[]))
        S.tableData[p.page_num] = clone(p);
    }
    if(d.split === 'unified'){
      for(const p of (source.pages||[]))
        if((p.tables||[]).length > 0) S.tableData[p.page_num] = clone(p);
    }
  }

  const allPageNums = new Set([
    ...Object.keys(S.textData).map(Number),
    ...Object.keys(S.tableData).map(Number),
  ]);
  for(const pn of allPageNums){
    if(!S.textData[pn]) S.textData[pn] = {page_num:pn, full_text:''};
    if(S.tableData[pn]) S.textData[pn].tables = S.tableData[pn].tables;
  }
  S.editorData = S.textData;
  S.editorSplit = 'text';
  buildEditorChrome();

  const hasGT = results.some(d=>d?.gt_saved);
  info(hasGT ? '✓ GT saved — editing will update it'
             : 'Click a block on PDF to jump to it • Edit text/table • Save & Evaluate',
       hasGT ? 'status-ok' : '');
};

// Replace renderReview globally
window.renderReview = _patchedRenderReview;

// ── patch renderTabs to also bind PDF highlight on tab click ─
const _origRenderTabs = window.renderTabs;
window.renderTabs = function(pages) {
  _origRenderTabs(pages);
  // Re-bind tabs to also scroll PDF
  for(const p of pages){
    const tab = document.getElementById(`tab-${p.page_num}`);
    if(!tab) continue;
    const orig = tab.onclick;
    tab.onclick = () => {
      orig && orig();
      window.PDF.highlightPage(p.page_num);
    };
  }
};

// ── patch renderPage to highlight active block ──────────────
const _origRenderPage = window.renderPage;
window.renderPage = function(pageNum) {
  _origRenderPage(pageNum);
  // Highlight all blocks on this page briefly
  // (clear active then re-activate if we have one)
  if(window.PDF.activeBlock && window.PDF.activeBlock.pn === pageNum){
    setTimeout(()=>{
      window.PDF.highlightBlock(pageNum, window.PDF.activeBlock.blockId);
    }, 50);
  }
  // Scroll PDF to that page
  window.PDF.highlightPage(pageNum);
};

// Boot
refreshAll();
</script>
